server {
  listen 80;
  listen [::]:80;
  server_name ryuucheatsbr.dev www.ryuucheatsbr.dev;

  root /var/www/ryuucheatsbr.dev;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|gif|png|jpg|jpeg|webp|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
